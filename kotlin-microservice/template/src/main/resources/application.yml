spring:
  application:
    name: {{app_name}}
{{- if eq stack_profile "relational-db" }}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
{{- end }}
{{- if eq stack_profile "nosql-cache" }}
  data:
    redis:
      timeout: 2s

app:
  mongo:
    database: {{app_name}}

mongock:
  migration-scan-package: {{tld}}.{{author}}.{{app_name}}.persistence.migration
  transaction-enabled: false
{{- end }}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

otel:
  service:
    name: ${OTEL_SERVICE_NAME:{{app_name}}}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      protocol: grpc
  traces:
    exporter: otlp
  metrics:
    exporter: none
  logs:
    exporter: none

aws:
  messaging:
    region: us-east-1
    endpoint-override: ""
    access-key: ""
    secret-key: ""
    topic-arn: ""
    queue-url: ""
    poll-wait-seconds: 10
    max-messages-per-poll: 10
