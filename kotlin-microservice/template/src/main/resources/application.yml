spring:
  application:
    name: {{app_name}}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

otel:
  service:
    name: ${OTEL_SERVICE_NAME:{{app_name}}}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      protocol: grpc
  traces:
    exporter: otlp
  metrics:
    exporter: none
  logs:
    exporter: none

aws:
  messaging:
    region: us-east-1
    endpoint-override: ""
    access-key: ""
    secret-key: ""
    topic-arn: ""
    queue-url: ""
    poll-wait-seconds: 10
    max-messages-per-poll: 10
